name: Node.js Build

on:
  push:
    branches: [ "main" ] # 当代码推送到 main 分支时触发
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read      # 允许读取仓库内容
  pages: write         # 允许写入 GitHub Pages
  id-token: write      # 这是解决该报错的关键：允许获取身份令牌

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4 # 检出你的代码

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.19' # 指定 Node.js 版本

    - name: Install pnpm
      run: npm install -g pnpm

    - name: Install dependencies
      run: pnpm install

    - name: Run build lib
      run: pnpm run build:lib

    - name: Run build
      run: pnpm run build:doc

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
          # 修改这里！设置为你的打包目录（如 dist, build, out 等）
          path: ./docs/.vitepress/dist
  deploy:
      needs: build
      runs-on: ubuntu-latest
      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
      steps:
        # 关键步骤：调用默认的部署逻辑
        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v4
